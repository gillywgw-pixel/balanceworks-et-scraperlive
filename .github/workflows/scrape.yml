name: Scrape ET Decisions

on:
  schedule:
    # Runs on Mondays in the first 7 days of each month (= first Monday of month)
    # at 06:00 UTC
    - cron: '0 6 1-7 * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml pdfplumber anthropic

      - name: Run scraper with PDF parsing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py --parse-pdfs

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/et-decisions.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: monthly ET decisions update $(date -u +'%Y-%m-%d')"
          git push
